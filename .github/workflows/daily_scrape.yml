name: Daily Web Scrape

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual triggers

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Data Directory
        run: mkdir -p data/scrapes # Ensures directory exists before script runs

      - name: Run Scraper
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          # Headless mode is vital for CI environments
          PYTHONUNBUFFERED: 1 
        run: python scraper.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Daily Scrape Data"
          file_pattern: 'data/scrapes/*.json' # Only push the new data
