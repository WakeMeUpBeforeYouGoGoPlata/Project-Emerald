name: Daily Web Scrape

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Removed cache for this run to ensure a clean slate

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify File Location
        # This will print the directory structure to the logs 
        # so we can catch if scraper.py is in a subfolder
        run: ls -R

      - name: Run Scraper
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          PYTHONUNBUFFERED: 1 
        # We use 'which' to confirm python3 exists, then run the script
        run: |
          which python3
          python3 ./scraper.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update: Daily Scrape Data"
