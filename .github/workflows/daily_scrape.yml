name: Daily Web Scrape

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Force the entire job to use bash to avoid 'sh' pathing issues
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: System Check
        run: |
          echo "Checking system paths..."
          which python
          which python3
          python3 --version

      - name: Find Scraper File
        run: |
          echo "Searching for scraper.py..."
          find . -name "scraper.py"
          echo "Current directory contents:"
          ls -F

      - name: Run Scraper
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          PYTHONUNBUFFERED: 1 
        run: |
          # We use the absolute path found in the previous step if necessary
          python3 ./scraper.py
- name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update property data: ${{ github.event.head_commit.timestamp }}"
          file_pattern: 'dublin_properties.db'
          # This helps avoid the "rejected" error by pulling latest changes first
          push_options: '--force' 
          # Or better yet, ensure it pulls before pushing:
          add_options: '-A'
