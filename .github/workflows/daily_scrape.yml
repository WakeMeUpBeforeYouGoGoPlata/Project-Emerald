name: Daily Web Scrape

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial: Gives the bot permission to push
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches full history so rebase works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt || echo "No requirements file"

      - name: Run Scraper
        run: python3 scraper.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push Changes
        run: |
          git config --global user.name "PropertyBot"
          git config --global user.email "bot@project-emerald.com"
          
          # 1. Pull the latest changes (your YAML edits) from GitHub
          git pull origin main --rebase
          
          # 2. Add the new data
          git add dublin_properties.db
          
          # 3. Only commit if the database actually changed
          if git diff --staged --quiet; then
            echo "No changes to the database. Skipping push."
          else
            git commit -m "Update property data: $(date)"
            # 4. Push back to the main branch
            git push origin main
          fi
